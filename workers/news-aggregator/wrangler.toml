name = "ahoosh-news-aggregator"
main = "src/index.ts"
compatibility_date = "2026-06-08"
workers_dev = true

# Ingest only — fetch + store raw headlines every 5 min (NO AI). All translation
# and article writing happens on Cowork (Claude) via the dispatcher heartbeat.
[triggers]
crons = ["*/5 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "ahoosh-news"
database_id = "62ecf193-ffd7-4d45-8a51-ad51eb139b93"

# No [ai] binding — this Worker runs zero AI. Claude/Cowork does all generation.

[observability]
enabled = true

[[routes]]
pattern = "ahoosh.ai/api/news*"
zone_name = "ahoosh.ai"
