name = "ahoosh-news-aggregator"
main = "src/index.ts"
compatibility_date = "2026-06-08"
workers_dev = true

# Pipeline A (translated news feed) — every 5 min.
# Pipeline B (original AHoosh "audited" articles) — twice a day (08:00 & 16:00 UTC ≈ 10:00 & 18:00 Belgrade), 1 each = 2/day.
[triggers]
crons = ["*/5 * * * *", "0 8,16 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "ahoosh-news"
database_id = "62ecf193-ffd7-4d45-8a51-ad51eb139b93"

# Workers AI — translation (source → English canonical → FA/DE/SR).
[ai]
binding = "AI"

[observability]
enabled = true

[[routes]]
pattern = "ahoosh.ai/api/news*"
zone_name = "ahoosh.ai"
