name = "ahoosh-markets-fetcher"
main = "src/index.ts"
compatibility_date = "2026-06-08"
workers_dev = true

# Pipeline 1 — Markets. Cron every 5 minutes.
# KV removed 2026-06-13 — all data served from D1 (zero KV operations).
# D1 free tier: 100k row reads/day, far more generous than KV's 1000 writes/day.
# TGJU refreshes ~5 min, so 5-min cadence loses no real freshness.
[triggers]
crons = ["*/5 * * * *"]

# D1 — historical snapshots + per-source failure state.
[[d1_databases]]
binding = "DB"
database_name = "ahoosh-markets"
database_id = "a81f8ee0-c741-4873-b1bd-401d10fd9dbb"

[observability]
enabled = true

# Exact routes only — deeper paths than the existing /api/markets Pages Function,
# so that function is NOT shadowed. (Smoke-test passed on workers.dev first.)
[[routes]]
pattern = "ahoosh.ai/api/markets/latest"
zone_name = "ahoosh.ai"

[[routes]]
pattern = "ahoosh.ai/api/markets/history"
zone_name = "ahoosh.ai"

# TELEGRAM_BOT_TOKEN + TELEGRAM_HESAM_CHAT_ID are set as secrets, not vars:
#   npx wrangler secret put TELEGRAM_BOT_TOKEN
#   npx wrangler secret put TELEGRAM_HESAM_CHAT_ID
